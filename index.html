<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(() => console.log('Service Worker registered'))
            .catch((err) => console.log('SW registration failed: ', err));
        });
      }
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>家計簿</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; }
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }

        /* スマホ全体の誤スクロール・びよんとなるバウンスを完全にロック */
        html, body {
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            margin: 0;
            padding: 0;
            position: relative;
        }
    </style>
</head>
<body class="bg-gray-100 flex justify-center">

    <div class="w-full max-w-md bg-white h-full shadow-lg flex flex-col justify-between relative overflow-hidden">
        
        <div id="page-kakeibo" class="p-4 flex-1 overflow-y-auto pb-28">
            
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-2xl font-bold text-gray-800">📝 家計簿</h1>
                
                <select id="month-filter" onchange="changeMonthFilter()" class="border border-gray-300 rounded-lg p-1.5 text-sm bg-gray-50 font-medium text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="all">全期間</option>
                </select>
            </div>

            <div class="bg-slate-900 text-white rounded-2xl p-4 mb-5 shadow-md border border-slate-800/30">

                <div class="flex justify-between text-[11px] text-slate-400 mb-3 bg-slate-800/40 p-2 rounded-xl border border-slate-800/50">
                    <div>資産(全期間): <span id="all-time-balance" class="font-bold text-slate-200 ml-1">¥0</span></div>

                    <div id="year-display-container">
                        <span id="fiscal-year-label">----</span>年度残高: <span id="year-balance" class="font-bold text-slate-200 ml-1">¥0</span>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm text-slate-400">収支</span>
                    <span id="total-balance" class="text-2xl font-bold text-blue-400">¥0</span>
                </div>
                <hr class="border-slate-800 my-2">
                <div class="flex justify-around text-center mt-2">
                    <div>
                        <div class="text-xs text-slate-400">収入</div>
                        <div id="total-income" class="text-base font-bold text-green-400">¥0</div>
                    </div>
                    <div>
                        <div class="text-xs text-slate-400">支出</div>
                        <div id="total-expense" class="text-base font-bold text-red-400">¥0</div>
                    </div>
                </div>
            </div>

            <div id="chart-container" class="bg-gray-50 rounded-2xl p-4 mb-6 border border-gray-100 hidden relative">
                <div class="flex bg-gray-200 p-1 rounded-xl mb-4">
                    <button id="tab-expense" onclick="switchChartTab('expense')" class="...">支出内訳</button>
                    <button id="tab-savings" onclick="switchChartTab('savings')" class="...">財形推移</button>
                    <button id="tab-balance" onclick="switchChartTab('balance')" class="...">毎月度残金</button>
                    <button id="tab-daily-balance" onclick="switchChartTab('daily-balance')" class="...">日次残高</button>
                </div>

                <div id="daily-balance-chart-wrapper" class="w-full hidden pt-2">
                    <canvas id="dailyBalanceChart"></canvas>
                </div>

                <div id="expense-chart-wrapper" class="w-full max-w-[220px] mx-auto">
                    <canvas id="expenseChart"></canvas>
                    <div id="expense-empty-msg" class="text-center text-sm text-gray-400 py-6 hidden">支出データがありません</div>
                </div>

                <div id="savings-chart-wrapper" class="w-full hidden">
                    <canvas id="savingsChart"></canvas>
                    <div id="savings-empty-msg" class="text-center text-sm text-gray-400 py-6 hidden">財形貯蓄のデータがまだありません</div>
                </div>

                <div id="balance-chart-wrapper" class="w-full hidden pt-2">
                    <canvas id="balanceChart"></canvas>
                </div>
            </div>

            <h2 class="text-lg font-bold text-gray-700 mb-3 pl-1">取引明細</h2>
            <div id="history-list" class="space-y-2 mb-4">
                </div>
        </div>

        <div id="page-wallets" class="p-4 flex-1 overflow-y-auto pb-28 hidden animate-fade-in">
            <h1 class="text-2xl font-bold text-gray-800 mb-5">👛 残高・ウォレット</h1>
                
            <div id="wallet-list" class="space-y-3.5"></div>
                
            <button onclick="toggleWalletManager(true)" class="w-full mt-6 text-sm text-gray-500 underline">
                決済種類の追加・削除
            </button>
            <div id="wallet-manager-modal" class="hidden fixed inset-0 bg-black/60 z-50 p-4 flex items-center justify-center">
                <div class="bg-white rounded-2xl w-full max-w-sm p-5 shadow-2xl">
                    <h3 class="font-bold mb-4">決済種類を管理</h3>

                    <div id="wallet-edit-list" class="space-y-2 mb-4"></div>

                    <div class="flex gap-2">
                        <select id="select-add-wallet" class="border rounded p-2 flex-1 text-sm bg-gray-50"></select>
                        <button onclick="addWalletFromSelect()" class="bg-blue-600 text-white px-4 rounded text-sm font-bold">追加</button>
                    </div>

                    <button onclick="toggleWalletManager(false)" class="mt-4 w-full text-gray-400 text-sm">閉じる</button>
                </div>
            </div>
        </div>

        <div id="page-data-admin" class="p-4 flex-1 overflow-y-auto pb-28 hidden animate-fade-in">
            <h1 class="text-2xl font-bold text-gray-800 mb-6">⚙️ データ管理</h1>

            <div class="bg-gray-50 border border-gray-100 rounded-2xl p-5 shadow-sm space-y-4">
                <h3 class="text-sm font-bold text-gray-600 mb-1">バックアップと復元</h3>
                <p class="text-xs text-gray-500 leading-relaxed">全てのデータをJSONファイルとしてダウンロード保存・復元できます。定期的なバックアップを推奨します。</p>
                
                <hr class="border-gray-200">
                
                <div class="flex flex-col gap-3">
                    <button onclick="exportData()" class="w-full bg-slate-800 hover:bg-slate-900 text-white text-sm py-3 rounded-xl shadow-sm font-medium transition-colors">
                        📥 今のデータをバックアップ保存
                    </button>
                    <button onclick="document.getElementById('import-file').click()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-700 text-sm py-3 rounded-xl shadow-xs font-medium transition-colors">
                        📤 ファイルからデータを復元
                    </button>
                    <input type="file" id="import-file" onchange="importData(event)" class="hidden" accept=".json">
                </div>
            </div>
        </div>


        <div class="border-t border-gray-200 bg-white flex justify-around py-3 bg-gray-50/95 backdrop-blur-md shadow-[0_-3px_10px_rgba(0,0,0,0.03)] z-40">
            <button id="btn-nav-kakeibo" onclick="switchPage('kakeibo')" class="flex flex-col items-center gap-1.5 flex-1 transition-colors text-blue-600">
                <span class="text-xl">📝</span>
                <span class="text-[11px] font-bold">家計簿</span>
            </button>
            <button id="btn-nav-wallets" onclick="switchPage('wallets')" class="flex flex-col items-center gap-1.5 flex-1 transition-colors text-gray-400">
                <span class="text-xl">👛</span>
                <span class="text-[11px] font-bold">決済残高</span>
            </button>
            <button id="btn-nav-data-admin" onclick="switchPage('data-admin')" class="flex flex-col items-center gap-1.5 flex-1 transition-colors text-gray-400">
                <span class="text-xl">⚙️</span>
                <span class="text-[11px] font-bold">データ管理</span>
            </button>
        </div>


        <button id="floating-plus-btn" onclick="toggleModal(true)" class="absolute bottom-20 right-6 bg-blue-600 text-white w-14 h-14 rounded-full shadow-xl flex items-center justify-center text-3xl font-light hover:bg-blue-700 focus:outline-none z-40 transition-transform active:scale-95 animate-fade-in">
            ＋
        </button>

        <div id="input-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
            <div class="bg-white rounded-2xl w-full max-w-sm p-5 shadow-2xl">
                <h3 class="text-lg font-bold text-gray-800 mb-4">明細の追加</h3>
                
                <div class="flex gap-2 mb-4 bg-gray-100 p-1 rounded-lg">
                    <label class="flex-1 text-center py-1.5 rounded-md cursor-pointer font-medium text-xs transition-colors" id="label-expense">
                        <input type="radio" name="type" value="expense" checked onchange="switchType('expense')" class="hidden"> 支出
                    </label>
                    <label class="flex-1 text-center py-1.5 rounded-md cursor-pointer font-medium text-xs transition-colors" id="label-transfer">
                        <input type="radio" name="type" value="transfer" onchange="switchType('transfer')" class="hidden"> 振替
                    </label>
                    <label class="flex-1 text-center py-1.5 rounded-md cursor-pointer font-medium text-xs transition-colors" id="label-income">
                        <input type="radio" name="type" value="income" onchange="switchType('income')" class="hidden"> 収入
                    </label>
                </div>

                <div class="mb-3">
                    <label class="block text-xs text-gray-500 mb-1">年月日</label>
                    <input type="date" id="input-date" class="w-full border rounded-lg p-2 text-sm bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <div class="mb-3">
                    <label class="block text-xs text-gray-500 mb-1">科目</label>
                    <select id="input-category" class="w-full border rounded-lg p-2 text-sm bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </select>
                </div>

                <div class="mb-3" id="payment-method-container">
                    <label class="block text-xs text-gray-500 mb-1">支払方法</label>
                    <select id="input-payment" class="w-full border rounded-lg p-2 text-sm bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        <option value="cash">通常（現金・クレジットカード等）</option>
                        <option value="paypay">PayPay</option>
                        <option value="suica">モバイルSuica</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="block text-xs text-gray-500 mb-1">金額 (円)</label>
                    <input type="text" id="input-amount" placeholder="0" oninput="formatAmountInput(this)" inputmode="numeric" class="w-full border rounded-lg p-2 text-sm bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <div class="mb-5">
                    <label class="block text-xs text-gray-500 mb-1">概要</label>
                    <input type="text" id="input-summary" placeholder="（任意）" class="w-full border rounded-lg p-2 text-sm bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <div class="flex justify-between items-center gap-2 mt-6">
                    <button id="btn-delete-tx" onclick="deleteFromModal()" class="px-4 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg hidden">
                        削除
                    </button>

                    <div class="flex gap-2 ml-auto">
                        <button onclick="toggleModal(false)" class="px-4 py-2 text-sm text-gray-500 hover:bg-gray-100 rounded-lg">キャンセル</button>
                        <button onclick="saveTransaction()" class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 shadow-sm">保存</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const INCOME_CATEGORIES = ["基本給", "役職手当", "時間外手当", "夜勤手当", "賞与", "その他"];
        const ALL_WALLET_OPTIONS = [
            { id: 'cash', name: '現金・銀行', icon: '🏦', isImg: false },
            { id: 'paypay', name: 'PayPay', icon: 'images/paypay.png', isImg: true },
            { id: 'suica', name: 'モバイルSuica', icon: 'images/suica.png', isImg: true },
            { id: 'rakuten', name: '楽天Edy', icon: 'images/rakuten.png', isImg: true },
            { id: 'waon', name: 'WAON', icon: 'images/waon.png', isImg: true },
            { id: 'toica', name: 'モバイルTOICA', icon: 'images/toica.png', isImg: true },
            { id: 'icoca', name: 'モバイルICOCA', icon: 'images/icoca.png', isImg: true }
        ];
        // --- 修正箇所: 設定読み込みロジック ---
        function getWalletConfig() {
            const saved = localStorage.getItem('my_wallet_settings');
            if (saved) return JSON.parse(saved);
                
            // 何も設定がない場合は「現金」だけにする
            const defaults = [ALL_WALLET_OPTIONS[0]]; 
            localStorage.setItem('my_wallet_settings', JSON.stringify(defaults));
            return defaults;
        }

        const EXPENSE_CATEGORIES = [
            "住宅費", "水道光熱費", "通信費", "税金", "社会保険料", 
            "保険料", "労働関係費", "株式投資費", "貯蓄（財形）", "食費", "外食費", 
            "交際費", "交通費", "教育・教養費", "医療費", "日用品費", 
            "娯楽費", "その他支出"
        ];
        const TRANSFER_CATEGORIES = ["PayPayへチャージ", "モバイルSuicaへチャージ", "その他口座間振替"];

        const STORAGE_KEY = 'my_kakeibo_core_data';
        const WALLET_KEY = 'my_kakeibo_wallets';
        let transactions = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        // --- 追加: 編集用の状態管理 ---
        let editingId = null;
        
        let currentChartTab = 'expense'; 
        let expenseChart = null;
        let savingsChart = null;
        let balanceChart = null;

        // 初期化
        document.getElementById('input-date').value = new Date().toISOString().substring(0, 10);
        switchType('expense');
        updateMonthFilterOptions();
        switchPage('kakeibo'); 
        updateUI();

        // 金額入力欄をリアルタイムにコンマ区切りにする関数
        function formatAmountInput(el) {
            let value = el.value.replace(/[^0-9]/g, '');
            if (value === '') {
                el.value = '';
                return;
            }
            el.value = parseInt(value, 10).toLocaleString();
        }

        // ページ切り替え
        function switchPage(page) {
            const pageKakeibo = document.getElementById('page-kakeibo');
            const pageWallets = document.getElementById('page-wallets');
            const pageDataAdmin = document.getElementById('page-data-admin');
            const btnKakeibo = document.getElementById('btn-nav-kakeibo');
            const btnWallets = document.getElementById('btn-nav-wallets');
            const btnDataAdmin = document.getElementById('btn-nav-data-admin');
            const floatingPlus = document.getElementById('floating-plus-btn');

            const pages = [pageKakeibo, pageWallets, pageDataAdmin];
            const btns = [btnKakeibo, btnWallets, btnDataAdmin];
            pages.forEach(p => p.classList.add('hidden'));
            btns.forEach(b => b.className = "flex flex-col items-center gap-1.5 flex-1 transition-colors text-gray-400");
            floatingPlus.classList.add('hidden');

            if (page === 'kakeibo') {
                pageKakeibo.classList.remove('hidden');
                floatingPlus.classList.remove('hidden');
                btnKakeibo.className = "flex flex-col items-center gap-1.5 flex-1 transition-colors text-blue-600 font-bold text-xs";
            } else if (page === 'wallets') {
                pageWallets.classList.remove('hidden');
                btnWallets.className = "flex flex-col items-center gap-1.5 flex-1 transition-colors text-purple-600 font-bold text-xs";
            } else if (page === 'data-admin') {
                pageDataAdmin.classList.remove('hidden');
                btnDataAdmin.className = "flex flex-col items-center gap-1.5 flex-1 transition-colors text-gray-700 font-bold text-xs";
            }
        }

        // 25日基準の月度判定
        function getBudgetMonth(dateStr) {
            if (!dateStr) return "";
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return "";
            let year = d.getFullYear();
            let month = d.getMonth() + 1;
            const day = d.getDate();

            const isSpecialPeriod = (dateStr >= "2026-06-20" && dateStr <= "2026-06-24");

            if (day >= 25 || isSpecialPeriod) {
                month += 1;
                if (month > 12) { month = 1; year += 1; }
            }
            return `${year}-${String(month).padStart(2, '0')}`;
        }

        // バックアップ・復元
        function exportData() {
            if (transactions.length === 0) return alert('出力するデータがありません。');
            const dataStr = JSON.stringify(transactions, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `kakeibo_backup_${new Date().toISOString().substring(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        if (confirm('データを復元しますか？（現在のデータは上書きされます）')) {
                            transactions = imported;
                            localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
                            updateMonthFilterOptions();
                            updateUI();
                            alert('データの復元が完了しました！');
                        }
                    } else {
                        alert('正しいバックアップファイルではありません。');
                    }
                } catch (err) {
                    alert('ファイルの読み込みに失敗しました。');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }


        // --- toggleModal 関数を更新 ---
        function toggleModal(show, tx = null) {
            const modal = document.getElementById('input-modal');
            const deleteBtn = document.getElementById('btn-delete-tx');

            if (show) {
                modal.classList.remove('hidden');

                if (tx) {
                    // 編集モード：既存データをセット
                    editingId = tx.id;
                    deleteBtn.classList.remove('hidden');

                    document.querySelector(`input[name="type"][value="${tx.type || (tx.income > 0 ? 'income' : 'expense')}"]`).click();
                    document.getElementById('input-date').value = tx.date;
                    document.getElementById('input-category').value = tx.category;
                    document.getElementById('input-amount').value = (tx.amount || tx.income || tx.expense).toLocaleString();
                    document.getElementById('input-summary').value = tx.summary;
                    document.getElementById('input-payment').value = tx.payment || 'cash';
                } else {
                    // 新規作成モード：日付を今日にリセットし、入力値をクリア
                    editingId = null;
                    deleteBtn.classList.add('hidden');

                    // ★ここを追加：モーダルを開くたびに今日の日付をセット
                    document.getElementById('input-date').value = new Date().toISOString().substring(0, 10);

                    document.getElementById('input-amount').value = '';
                    document.getElementById('input-summary').value = '';
                    // 必要であればデフォルトのタブを支出に戻す処理
                    document.querySelector('input[name="type"][value="expense"]').click();
                }
            } else {
                modal.classList.add('hidden');
                editingId = null;
            }
        }

        // --- 新規追加：モーダル内からの削除処理 ---
        function deleteFromModal() {
            if (editingId && confirm('この明細を本当に削除しますか？')) {
                transactions = transactions.filter(tx => tx.id !== editingId);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
                toggleModal(false);
                updateUI();
            }
        }

        function switchType(type) {
            const catSelect = document.getElementById('input-category');
            const lblExpense = document.getElementById('label-expense');
            const lblTransfer = document.getElementById('label-transfer');
            const lblIncome = document.getElementById('label-income');
            const paymentContainer = document.getElementById('payment-method-container');
            
            catSelect.innerHTML = '';
            lblExpense.className = "flex-1 text-center py-1.5 rounded-md cursor-pointer font-medium text-xs text-gray-500";
            lblTransfer.className = "flex-1 text-center py-1.5 rounded-md cursor-pointer font-medium text-xs text-gray-500";
            lblIncome.className = "flex-1 text-center py-1.5 rounded-md cursor-pointer font-medium text-xs text-gray-500";
            
            if (type === 'expense') {
                EXPENSE_CATEGORIES.forEach(c => catSelect.add(new Option(c, c)));
                lblExpense.className = "flex-1 text-center py-1.5 rounded-md cursor-pointer font-bold text-xs bg-white text-red-600 shadow-xs";
                paymentContainer.classList.remove('hidden');
            } else if (type === 'transfer') {
                const activeWallets = getWalletConfig();
                activeWallets.forEach(w => {
                    if (w.id !== 'cash') catSelect.add(new Option(`${w.name}へチャージ`, `charge_${w.id}`));
                });
            } else {
                INCOME_CATEGORIES.forEach(c => catSelect.add(new Option(c, c)));
                lblIncome.className = "flex-1 text-center py-1.5 rounded-md cursor-pointer font-bold text-xs bg-white text-green-600 shadow-xs";
                paymentContainer.classList.add('hidden');
            }
        }

        function switchChartTab(tab) {
            currentChartTab = tab;
            updateUI();
        }

        // --- saveTransactionを編集対応に拡張 ---
        function saveTransaction() {
            const type = document.querySelector('input[name="type"]:checked').value;
            const date = document.getElementById('input-date').value;
            const category = document.getElementById('input-category').value;
            const amountInputStr = document.getElementById('input-amount').value;
            const summary = document.getElementById('input-summary').value;
            const payment = document.getElementById('input-payment').value;
        
            const amount = parseInt(amountInputStr.replace(/,/g, ''), 10) || 0;
            if (amount <= 0) return alert('金額を正しく入力してください');
        
            if (editingId) {
                // 既存データの更新
                const index = transactions.findIndex(t => t.id === editingId);
                transactions[index] = {
                    ...transactions[index],
                    date, category, summary, type,
                    income: type === 'income' ? amount : 0,
                    expense: type === 'expense' ? amount : 0,
                    amount,
                    payment: type === 'expense' ? payment : 'cash'
                };
            } else {
                // 新規保存
                transactions.push({
                    id: Date.now(),
                    date, category, summary, type,
                    income: type === 'income' ? amount : 0,
                    expense: type === 'expense' ? amount : 0,
                    amount,
                    payment: type === 'expense' ? payment : 'cash'
                });
            }
        
            localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
            toggleModal(false);
            updateUI();
        }

        function deleteTransaction(id) {
            if (confirm('この明細を削除しますか？')) {
                transactions = transactions.filter(tx => tx.id !== id);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
                updateMonthFilterOptions(document.getElementById('month-filter').value);
                updateUI();
            }
        }

        function updateMonthFilterOptions(selectTarget = null) {
            const filterSelect = document.getElementById('month-filter');
            const currentSelected = selectTarget || filterSelect.value || 'all';

            // 存在する全月度（YYYY-MM）を取得
            const budgetMonths = [...new Set(transactions.map(tx => getBudgetMonth(tx.date)))].filter(m => m).sort((a, b) => b.localeCompare(a));

            // データから存在する全年度を抽出 (4月-3月基準で計算)
            const fiscalYears = [...new Set(budgetMonths.map(m => {
                const [y, mNum] = m.split('-').map(Number);
                return mNum <= 3 ? y - 1 : y;
            }))].sort((a, b) => b - a);
        
            filterSelect.innerHTML = '<option value="all">全期間</option>';

            const yearGroup = document.createElement('optgroup');
            yearGroup.label = "年度別";
            fiscalYears.forEach(y => yearGroup.appendChild(new Option(`${y}年度`, `fy-${y}`)));
            filterSelect.appendChild(yearGroup);
        
            const monthGroup = document.createElement('optgroup');
            monthGroup.label = "月別";
            budgetMonths.forEach(m => {
                const [y, mNum] = m.split('-');
                monthGroup.appendChild(new Option(`${y}年${mNum}月度`, m));
            });
            filterSelect.appendChild(monthGroup);
        
            filterSelect.value = currentSelected;
        }

        function changeMonthFilter() {
            updateUI();
        }

        // 編集モード切り替え
        function toggleEditMode(wallet) {
            const editDiv = document.getElementById(`edit-${wallet}`);
            const inputField = document.getElementById(`input-${wallet}`);
            const btn = document.getElementById(`btn-edit-${wallet}`); // ボタンを取得

            // 編集エリアが表示される直前の処理（開くとき）
            if (editDiv.classList.contains('hidden')) {
                const savedWallets = JSON.parse(localStorage.getItem('my_kakeibo_wallets')) || { paypay: 0, suica: 0 };
                const currentVal = savedWallets[wallet] || 0;
                inputField.placeholder = `開始時: ${currentVal}円`;
                inputField.value = "";
            }
        
            // 編集エリアの表示切替
            editDiv.classList.toggle('hidden');

            // ボタンの表示切替（ボタンだけを消す）
            if (btn) {
                btn.classList.toggle('hidden');
            }
        }

        // 初期残高の保存処理
        function updateBalance(wallet) {
            const inputVal = parseInt(document.getElementById(`input-${wallet}`).value) || 0;
            const savedWallets = JSON.parse(localStorage.getItem('my_kakeibo_wallets')) || { paypay: 0, suica: 0 };

            savedWallets[wallet] = inputVal;
            localStorage.setItem('my_kakeibo_wallets', JSON.stringify(savedWallets));

            // 完了したら編集エリアを隠し、ボタンを再表示させる
            toggleEditMode(wallet);
            updateUI();
        }


        function updateUI() {
            const filterValue = document.getElementById('month-filter').value;
            const container = document.getElementById('chart-container');

            // グラフコンテナの表示切替
            if (transactions.length === 0) {
                container.classList.add('hidden');
            } else {
                container.classList.remove('hidden');
            }

            // 各お財布の残高計算（保存された初期値からスタート）
            const savedWallets = JSON.parse(localStorage.getItem(WALLET_KEY)) || {};
            let balances = { cash: 0, ...savedWallets }; // ※初期残高を読み込む

            [...transactions].sort((a,b) => a.date.localeCompare(b.date)).forEach(tx => {
                const amt = tx.amount || tx.income || tx.expense || 0;
                const txType = tx.type || (tx.income > 0 ? 'income' : 'expense');

                if (txType === 'expense') {
                    balances[tx.payment] = (balances[tx.payment] || 0) - amt;
                } else if (txType === 'transfer' && tx.category.startsWith('charge_')) {
                    const targetId = tx.category.replace('charge_', '');
                    balances['cash'] = (balances['cash'] || 0) - amt;
                    balances[targetId] = (balances[targetId] || 0) + amt;
                } else if (txType === 'income') {
                    balances['cash'] = (balances['cash'] || 0) + amt;
                }
            });
            renderWallets(balances);

            // 全期間・選択年度の残高計算
            let allTimeBalance = 0;
            transactions.forEach(tx => { allTimeBalance += ((tx.income || 0) - (tx.expense || 0)); });

            let targetYear = null;
            if (filterValue.startsWith('fy-')) {
                targetYear = parseInt(filterValue.split('-')[1]);
            } else if (filterValue !== 'all') {
                const [y, m] = filterValue.split('-').map(Number);
                targetYear = m <= 3 ? y - 1 : y;
            }

            let yearBalance = 0;
            if (targetYear !== null) {
                transactions.forEach(tx => {
                    const [y, m] = getBudgetMonth(tx.date).split('-').map(Number);
                    if ((m <= 3 ? y - 1 : y) === targetYear) {
                        yearBalance += ((tx.income || 0) - (tx.expense || 0));
                    }
                });
            }

            if(document.getElementById('all-time-balance')) {
                document.getElementById('all-time-balance').innerText = `¥${allTimeBalance.toLocaleString()}`;
                document.getElementById('year-balance').innerText = `¥${yearBalance.toLocaleString()}`;
                document.getElementById('fiscal-year-label').innerText = targetYear ? `${targetYear}` : "----";
            }

            // 1. データのフィルタリング（年度・月度対応）
            const filteredTxs = transactions.filter(tx => {
                if (filterValue === 'all') return true;
                
                const [y, m] = getBudgetMonth(tx.date).split('-').map(Number);
                const txYear = m <= 3 ? y - 1 : y;

                // 年度判定
                if (filterValue.startsWith('fy-')) {
                    const targetYear = parseInt(filterValue.split('-')[1]);
                    return txYear === targetYear;
                }
                
                // 月度判定
                return getBudgetMonth(tx.date) === filterValue;
            }).sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);

            // 2. 選択期間内の収支合計（パネル表示用）
            let totalIncome = 0;
            let totalExpense = 0;
            filteredTxs.forEach(tx => {
                totalIncome += tx.income || 0;
                totalExpense += tx.expense || 0;
            });

            // 3. アコーディオン用のグループ化とリスト表示
            const historyList = document.getElementById('history-list');
            historyList.innerHTML = '';

            const groupedTxs = filteredTxs.reduce((groups, tx) => {
                if (!groups[tx.date]) groups[tx.date] = [];
                groups[tx.date].push(tx);
                return groups;
            }, {});

            Object.keys(groupedTxs).sort((a, b) => b.localeCompare(a)).forEach(date => {
                const txs = groupedTxs[date];
                const dateId = `group-${date}`;
                
                const dayIncome = txs.reduce((sum, tx) => sum + (tx.income || 0), 0);
                const dayExpense = txs.reduce((sum, tx) => sum + (tx.expense || 0), 0);
                
                const header = document.createElement('div');
                header.className = "bg-gray-100 p-2 rounded-lg cursor-pointer flex justify-between items-center text-sm font-bold text-gray-700 mt-2";
                
                let summaryText = "";
                if (dayIncome > 0) summaryText += `<span class='text-green-600 mr-2'>+¥${dayIncome.toLocaleString()}</span>`;
                if (dayExpense > 0) summaryText += `<span class='text-red-600'>-¥${dayExpense.toLocaleString()}</span>`;
                
                header.innerHTML = `<div class="flex items-center"><span class="mr-4">${date}</span><span class="text-[10px] font-normal">${summaryText}</span></div><span>▼</span>`;

                header.onclick = () => {
                    const list = document.getElementById(dateId);
                    if (list.classList.contains('hidden')) {
                        list.classList.remove('hidden');
                        list.style.maxHeight = list.scrollHeight + "px";
                    } else {
                        list.style.maxHeight = "0px";
                        setTimeout(() => list.classList.add('hidden'), 300);
                    }
                };
                historyList.appendChild(header);

                const listDiv = document.createElement('div');
                listDiv.id = dateId;
                listDiv.className = "space-y-2 mt-1 overflow-hidden transition-all duration-300 ease-out hidden";
                listDiv.style.maxHeight = "0px";
                
                txs.forEach(tx => {
                    const txType = tx.type || (tx.income > 0 ? 'income' : 'expense');
                    let amtText = txType === 'income' ? `+¥${tx.income.toLocaleString()}` : txType === 'expense' ? `-¥${tx.expense.toLocaleString()}` : `➔ ¥${tx.amount.toLocaleString()}`;
                    let amtColor = txType === 'income' ? 'text-green-600' : txType === 'expense' ? 'text-red-600' : 'text-purple-600';
                    let paymentLabel = tx.payment === 'paypay' ? " <span class='text-[10px] bg-purple-50 text-purple-500 px-1.5 py-0.5 rounded ml-1'>PayPay</span>" : tx.payment === 'suica' ? " <span class='text-[10px] bg-emerald-50 text-emerald-500 px-1.5 py-0.5 rounded ml-1'>Suica</span>" : "";

                    const card = document.createElement('div');
                    card.className = "bg-white border border-gray-100 rounded-xl p-3 shadow-xs flex justify-between items-center hover:bg-gray-50 cursor-pointer";
                    card.onclick = () => toggleModal(true, tx);
                    card.innerHTML = `<div class="flex-1"><div class="text-[10px] text-gray-400">【${tx.category}】</div><div class="text-sm font-medium text-gray-800">${tx.summary}${paymentLabel}</div></div><div class="text-sm font-bold ${amtColor}">${amtText}</div>`;
                    listDiv.appendChild(card);
                });
                historyList.appendChild(listDiv);
            });

            // 4. 数値の反映
            document.getElementById('total-income').innerText = `¥${totalIncome.toLocaleString()}`;
            document.getElementById('total-expense').innerText = `¥${totalExpense.toLocaleString()}`;
            document.getElementById('total-balance').innerText = `¥${(totalIncome - totalExpense).toLocaleString()}`;

            // 5. グラフ描画関数へデータを渡す
            renderCharts(filteredTxs);

            const yearDisplay = document.getElementById('year-display-container');

            // 全期間（filterValue === 'all'）の場合は非表示にし、それ以外は表示する
            if (filterValue === 'all') {
                yearDisplay.classList.add('hidden');
            } else {
                yearDisplay.classList.remove('hidden');
                // 年度ラベルを更新
                document.getElementById('fiscal-year-label').innerText = targetYear;
                document.getElementById('year-balance').innerText = `¥${yearBalance.toLocaleString()}`;
            }
        }

        function renderCharts(filteredTxs) {
            const tabs = {
                expense: { btn: 'tab-expense', wrapper: 'expense-chart-wrapper' },
                savings: { btn: 'tab-savings', wrapper: 'savings-chart-wrapper' },
                balance: { btn: 'tab-balance', wrapper: 'balance-chart-wrapper' },
                'daily-balance': { btn: 'tab-daily-balance', wrapper: 'daily-balance-chart-wrapper' }
            };
        
            // タブ表示切替ロジック
            Object.keys(tabs).forEach(t => {
                const btn = document.getElementById(tabs[t].btn);
                const wrapper = document.getElementById(tabs[t].wrapper);
                if (t === currentChartTab) {
                    btn.className = "flex-1 text-center py-1.5 rounded-lg text-[10px] px-1 font-bold bg-white text-gray-800 shadow-xs";
                    wrapper.classList.remove('hidden');
                } else {
                    btn.className = "flex-1 text-center py-1.5 rounded-lg text-[10px] px-1 font-medium text-gray-500";
                    wrapper.classList.add('hidden');
                }
            });
        
            // 各グラフに filteredTxs を渡す
            if (currentChartTab === 'expense') {
                drawExpenseChart(filteredTxs);
            } else if (currentChartTab === 'savings') {
                drawSavingsChart(); // 財形は全期間の積み上げなので引数なしでOK
            } else if (currentChartTab === 'balance') {
                drawBalanceChart(filteredTxs);
            } else if (currentChartTab === 'daily-balance') {
                drawDailyBalanceChart(filteredTxs);
            }
        }

        function drawExpenseChart(txs) {
            const expenseMap = {};
            txs.forEach(tx => {
                if (tx.expense > 0) {
                    expenseMap[tx.category] = (expenseMap[tx.category] || 0) + tx.expense;
                }
            });
        
            const ctx = document.getElementById('expenseChart').getContext('2d');
            const sortedKeys = EXPENSE_CATEGORIES.filter(c => expenseMap[c] > 0);
            const sortedData = sortedKeys.map(c => expenseMap[c]);
            const initialTotal = sortedData.reduce((s, v) => s + v, 0);
        
            const chartEl = document.getElementById('expenseChart');
            const emptyMsgEl = document.getElementById('expense-empty-msg');
        
            if (initialTotal === 0) {
                chartEl.classList.add('hidden');
                emptyMsgEl.classList.remove('hidden');
                return;
            }
            chartEl.classList.remove('hidden');
            emptyMsgEl.classList.add('hidden');
        
            if (typeof expenseChart !== 'undefined' && expenseChart) expenseChart.destroy();
        
            expenseChart = new Chart(ctx, {
                type: 'doughnut',
                plugins: [ChartDataLabels, {
                    id: 'centerText',
                    afterDatasetsDraw: (chart) => {
                        const { ctx, chartArea: { width, height, left, top }, data } = chart;
                        let currentTotal = 0;
                        chart.getDatasetMeta(0).data.forEach((element, index) => {
                            if (!element.hidden) currentTotal += data.datasets[0].data[index];
                        });
                    
                        ctx.save();
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        const centerX = width / 2 + left;
                        const centerY = height / 2 + top;
                        ctx.fillStyle = '#6b7280';
                        ctx.font = '11px sans-serif';
                        ctx.fillText('支出総額', centerX, centerY - 8);
                        ctx.fillStyle = '#1f2937';
                        ctx.font = 'bold 17px sans-serif';
                        ctx.fillText('¥' + currentTotal.toLocaleString(), centerX, centerY + 10);
                        ctx.restore();
                    }
                }],
                data: {
                    labels: sortedKeys,
                    datasets: [{
                        data: sortedData,
                        // 色の配列を保持しておく
                        backgroundColor: ['#ef4444', '#f97316', '#f59e0b', '#eab308', '#84cc16', '#10b981', '#06b6d4', '#3b82f6', '#6366f1', '#8b5cf6', '#d946ef', '#14b8a6', '#64748b', '#a855f7', '#0ea5e9', '#ec4899'],
                        borderWidth: 0,
                        cutout: '50%'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { 
                                boxWidth: 10, 
                                font: { size: 9 },
                                // 色情報を保持しつつ、取り消し線用のスタイルを適用
                                generateLabels: (chart) => {
                                    const data = chart.data;
                                    return data.labels.map((label, i) => {
                                        const meta = chart.getDatasetMeta(0);
                                        const hidden = meta.data[i].hidden;
                                        const color = data.datasets[0].backgroundColor[i];
                                        return {
                                            text: label,
                                            fillStyle: hidden ? '#d1d5db' : color, // 色を適用
                                            strokeStyle: hidden ? '#d1d5db' : color,
                                            lineWidth: 1,
                                            hidden: hidden,
                                            index: i
                                        };
                                    });
                                }
                            },
                            onClick: (e, legendItem, legend) => {
                                const index = legendItem.index;
                                const meta = legend.chart.getDatasetMeta(0);
                                meta.data[index].hidden = !meta.data[index].hidden;
                                legend.chart.update();
                            }
                        },
                        tooltip: { 
                            callbacks: { 
                                label: (c) => {
                                    const meta = c.chart.getDatasetMeta(0);
                                    let currentTotal = 0;
                                    meta.data.forEach((el, i) => { if (!el.hidden) currentTotal += c.dataset.data[i]; });
                                    return `${c.label}: ¥${c.raw.toLocaleString()} (${((c.raw / currentTotal) * 100).toFixed(1)}%)`;
                                }
                            } 
                        },
                        datalabels: {
                            color: '#fff',
                            font: { weight: 'bold', size: 10 },
                            formatter: (v, context) => {
                                const meta = context.chart.getDatasetMeta(0);
                                if (meta.data[context.dataIndex].hidden) return '';
                                let currentTotal = 0;
                                meta.data.forEach((el, i) => { if (!el.hidden) currentTotal += context.dataset.data[i]; });
                                return (currentTotal > 0 && (v / currentTotal) > 0.05) ? Math.round((v / currentTotal) * 100) + '%' : '';
                            }
                        }
                    }
                }
            });
        }

        function drawSavingsChart() {
            const ctx = document.getElementById('savingsChart').getContext('2d');
            const canvasEl = document.getElementById('savingsChart');
            const emptyMsg = document.getElementById('savings-empty-msg');

            const hasSavings = transactions.some(tx => tx.category === '貯蓄（財形）');
            if (!hasSavings) {
                canvasEl.classList.add('hidden');
                emptyMsg.classList.remove('hidden');
                return;
            }
            canvasEl.classList.remove('hidden');
            emptyMsg.classList.add('hidden');

            const sortedTxs = [...transactions].sort((a, b) => a.date.localeCompare(b.date) || a.id - b.id);
            let runningSavings = 0;
            const monthlySavings = {};

            sortedTxs.forEach(tx => {
                if (tx.category === '貯蓄（財形）') { runningSavings += tx.expense; }
                const budgetMonth = getBudgetMonth(tx.date);
                if (budgetMonth) { monthlySavings[budgetMonth] = runningSavings; }
            });

            const sortedMonths = Object.keys(monthlySavings).sort();
            const dataValues = sortedMonths.map(m => monthlySavings[m]);
            const displayLabels = sortedMonths.map(m => {
                const p = m.split('-');
                return `${p[1]}月度`;
            });

            if (savingsChart) savingsChart.destroy();

            savingsChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: displayLabels,
                    datasets: [{
                        label: '財形貯蓄 累計残高',
                        data: dataValues,
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.08)',
                        borderWidth: 2,
                        tension: 0.2,
                        pointBackgroundColor: '#10b981',
                        pointRadius: 4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { ticks: { font: { size: 9 }, callback: value => '¥' + value.toLocaleString() } },
                        x: { ticks: { font: { size: 9 } } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function drawBalanceChart(txs) {
            const ctx = document.getElementById('balanceChart').getContext('2d');
            const monthlyData = {};
            txs.forEach(tx => {
                const month = getBudgetMonth(tx.date);
                if (!monthlyData[month]) monthlyData[month] = { income: 0, expense: 0 };
                monthlyData[month].income += (tx.income || 0);
                monthlyData[month].expense += (tx.expense || 0);
            });
        
            const sortedMonths = Object.keys(monthlyData).sort();
            const labels = sortedMonths.map(m => m.replace('-', '年') + '月');
            const balances = sortedMonths.map(m => monthlyData[m].income - monthlyData[m].expense);
        
            if (balanceChart) balanceChart.destroy();
            balanceChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '純収支',
                        data: balances,
                        backgroundColor: balances.map(b => b >= 0 ? '#22c55e' : '#ef4444')
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false } // ★ここを追加
                    }
                }
            });
        }

        let dailyBalanceChart = null; // 変数を宣言

        function drawDailyBalanceChart(filteredTxs) {
            const ctx = document.getElementById('dailyBalanceChart').getContext('2d');
            if (filteredTxs.length === 0) return;

            const sortedTxs = [...filteredTxs].sort((a, b) => a.date.localeCompare(b.date));
            const minDate = new Date(sortedTxs[0].date);
            const maxDate = new Date(sortedTxs[sortedTxs.length - 1].date);

            // 期間開始前の残高計算
            let runningBalance = 2340 + 2542;
            transactions.forEach(tx => {
                if (new Date(tx.date) < minDate) {
                    runningBalance += (tx.income || 0) - (tx.expense || 0);
                }
            });
        
            const dailyChanges = {};
            sortedTxs.forEach(tx => {
                const net = (tx.income || 0) - (tx.expense || 0);
                dailyChanges[tx.date] = (dailyChanges[tx.date] || 0) + net;
            });
        
            const fullLabels = [];
            const fullBalances = [];
            let current = new Date(minDate);
            while (current <= maxDate) {
                const dateStr = current.toISOString().split('T')[0];
                fullLabels.push(dateStr);
                runningBalance += (dailyChanges[dateStr] || 0);
                fullBalances.push(runningBalance);
                current.setDate(current.getDate() + 1);
            }
        
            if (dailyBalanceChart) dailyBalanceChart.destroy();
            dailyBalanceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: fullLabels,
                    datasets: [{
                        data: fullBalances,
                        borderColor: '#000000',
                        borderWidth: 2,
                        tension: 0,
                        pointRadius: 0,
                        fill: { target: { value: 0 }, above: 'rgba(34, 197, 94, 0.2)', below: 'rgba(239, 68, 68, 0.2)' }
                    }]
                },
                options: {
                    responsive: true,
                    interaction: { mode: 'index', axis: 'x', intersect: false },
                    scales: {
                        y: { ticks: { callback: (v) => (v / 10000) + '万円', font: { size: 9 } } },
                        x: { ticks: { font: { size: 9 }, callback: (val, index) => index % 10 === 0 ? fullLabels[index] : '' } }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { title: (items) => '日付: ' + items[0].label, label: (item) => ' 残金: ¥' + item.raw.toLocaleString() } }
                    }
                }
            });
        }

        function toggleWalletManager(show) {
            document.getElementById('wallet-manager-modal').classList.toggle('hidden', !show);
            if (!show) return;
            const list = document.getElementById('wallet-edit-list');
            const select = document.getElementById('select-add-wallet');
            list.innerHTML = ''; select.innerHTML = '<option value="">追加する種類を選択...</option>';
            const current = getWalletConfig();
            current.forEach(w => {
                list.innerHTML += `<div class="flex justify-between p-2 bg-gray-50 rounded text-sm items-center"><span>${w.name}</span>${w.id !== 'cash' ? `<button onclick="deleteWallet('${w.id}')" class="text-red-500">削除</button>` : ''}</div>`;
            });
            ALL_WALLET_OPTIONS.forEach(opt => { if (!current.find(c => c.id === opt.id)) select.add(new Option(opt.name, opt.id)); });
        }

        function addWalletFromSelect() {
            const id = document.getElementById('select-add-wallet').value;
            if (!id) return;
            const configs = getWalletConfig();
            configs.push(ALL_WALLET_OPTIONS.find(o => o.id === id));
            localStorage.setItem('my_wallet_settings', JSON.stringify(configs));
            toggleWalletManager(true); updateUI();
        }

        function deleteWallet(id) {
            let configs = getWalletConfig().filter(w => w.id !== id);
            localStorage.setItem('my_wallet_settings', JSON.stringify(configs));
            toggleWalletManager(true); updateUI();
        }
    </script>
</body>
</html>
