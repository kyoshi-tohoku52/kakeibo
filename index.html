<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>マイ家計簿 Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; }
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
        html, body { overflow: hidden; height: 100vh; height: 100dvh; margin: 0; padding: 0; position: relative; }
    </style>
</head>
<body class="bg-gray-100 flex justify-center">

    <div class="w-full max-w-md bg-white h-full shadow-lg flex flex-col justify-between relative overflow-hidden">
        
        <div id="page-kakeibo" class="p-4 flex-1 overflow-y-auto pb-28">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-2xl font-bold text-gray-800">📝 家計簿</h1>
                <select id="month-filter" onchange="changeMonthFilter()" class="border border-gray-300 rounded-lg p-1.5 text-sm bg-gray-50 font-medium text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="all">全期間</option>
                </select>
            </div>

            <div class="bg-slate-900 text-white rounded-2xl p-4 mb-5 shadow-md border border-slate-800/30">
                <div class="flex justify-between text-[11px] text-slate-400 mb-3 bg-slate-800/40 p-2 rounded-xl border border-slate-800/50">
                    <div>資産総額: <span id="all-time-balance" class="font-bold text-slate-200 ml-1">¥0</span></div>
                    <div><span id="fiscal-year-label">----</span>年度残高: <span id="year-balance" class="font-bold text-slate-200 ml-1">¥0</span></div>
                </div>
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm text-slate-400">選択月の純収支</span>
                    <span id="total-balance" class="text-2xl font-bold text-blue-400">¥0</span>
                </div>
                <hr class="border-slate-800 my-2">
                <div class="flex justify-around text-center mt-2">
                    <div><div class="text-xs text-slate-400">収入</div><div id="total-income" class="text-base font-bold text-green-400">¥0</div></div>
                    <div><div class="text-xs text-slate-400">支出</div><div id="total-expense" class="text-base font-bold text-red-400">¥0</div></div>
                </div>
            </div>

            <div id="chart-container" class="bg-gray-50 rounded-2xl p-4 mb-6 border border-gray-100 relative">
                <div class="flex bg-gray-200 p-1 rounded-xl mb-4">
                    <button id="tab-expense" onclick="switchChartTab('expense')" class="flex-1 text-center py-1.5 rounded-lg text-[10px] px-1 font-bold bg-white text-gray-800 shadow-xs">支出内訳</button>
                    <button id="tab-savings" onclick="switchChartTab('savings')" class="flex-1 text-center py-1.5 rounded-lg text-[10px] px-1 font-medium text-gray-500">財形推移</button>
                    <button id="tab-balance" onclick="switchChartTab('balance')" class="flex-1 text-center py-1.5 rounded-lg text-[10px] px-1 font-medium text-gray-500">毎月度残金</button>
                </div>
                <div id="expense-chart-wrapper" class="w-full max-w-[220px] mx-auto"><canvas id="expenseChart"></canvas></div>
                <div id="savings-chart-wrapper" class="w-full hidden"><canvas id="savingsChart"></canvas></div>
                <div id="balance-chart-wrapper" class="w-full hidden pt-2"><canvas id="balanceChart"></canvas></div>
            </div>

            <h2 class="text-lg font-bold text-gray-700 mb-3 pl-1">取引明細</h2>
            <div id="history-list" class="space-y-2 mb-4"></div>
        </div>

        <div id="page-wallets" class="p-4 flex-1 overflow-y-auto pb-28 hidden animate-fade-in">
            <h1 class="text-2xl font-bold text-gray-800 mb-5">👛 残高・ウォレット</h1>
            <div class="space-y-3.5">
                <div class="bg-white border border-gray-100 rounded-2xl p-4.5 flex justify-between items-center shadow-xs">
                    <div class="flex items-center gap-4">
                        <div class="w-11 h-11 bg-slate-100 rounded-full flex items-center justify-center text-xl">🏦</div>
                        <div><div class="text-base font-bold text-gray-800">通常（現金・銀行）</div></div>
                    </div>
                    <span id="normal-balance" class="text-xl font-extrabold text-slate-700">¥0</span>
                </div>
                <div class="bg-white border border-gray-100 rounded-2xl p-4.5 flex justify-between items-center shadow-xs">
                    <div class="flex items-center gap-4">
                        <img src="https://iconlab.kentakomiya.com/wp/wp-content/uploads/2019/06/icon0084.png" alt="PayPay" class="w-11 h-11 object-contain">
                        <div><div class="text-base font-bold text-gray-800">PayPay残高</div></div>
                    </div>
                    <span id="paypay-balance" class="text-xl font-extrabold text-purple-600">¥0</span>
                </div>
                <div class="bg-white border border-gray-100 rounded-2xl p-4.5 flex justify-between items-center shadow-xs">
                    <div class="flex items-center gap-4">
                        <img src="https://play-lh.googleusercontent.com/XWuB3KQHW8BqGA4lAo60n8A0Syz2LQXEgXPQuvEps_R_47jnnVauzhoHLvRP7CT0w-Ai-Ug7IHhVd_yUiVYu" alt="モバイルSuica" class="w-11 h-11 object-contain">
                        <div><div class="text-base font-bold text-gray-800">モバイルSuica</div></div>
                    </div>
                    <span id="suica-balance" class="text-xl font-extrabold text-emerald-600">¥0</span>
                </div>
            </div>
        </div>

        <div id="page-data-admin" class="p-4 flex-1 overflow-y-auto pb-28 hidden animate-fade-in">
            <h1 class="text-2xl font-bold text-gray-800 mb-6">⚙️ データ管理</h1>
            <div class="bg-gray-50 border border-gray-100 rounded-2xl p-5 shadow-sm space-y-4">
                <button onclick="exportData()" class="w-full bg-slate-800 text-white py-3 rounded-xl font-medium">📥 バックアップ保存</button>
                <button onclick="document.getElementById('import-file').click()" class="w-full bg-gray-200 text-gray-700 py-3 rounded-xl font-medium">📤 データを復元</button>
                <input type="file" id="import-file" onchange="importData(event)" class="hidden" accept=".json">
            </div>
        </div>

        <div class="border-t border-gray-200 bg-white flex justify-around py-3 bg-gray-50/95 backdrop-blur-md z-40">
            <button id="btn-nav-kakeibo" onclick="switchPage('kakeibo')" class="flex flex-col items-center flex-1 text-blue-600 font-bold"><span class="text-xl">📝</span><span class="text-[11px]">家計簿</span></button>
            <button id="btn-nav-wallets" onclick="switchPage('wallets')" class="flex flex-col items-center flex-1 text-gray-400 font-bold"><span class="text-xl">👛</span><span class="text-[11px]">決済残高</span></button>
            <button id="btn-nav-data-admin" onclick="switchPage('data-admin')" class="flex flex-col items-center flex-1 text-gray-400 font-bold"><span class="text-xl">⚙️</span><span class="text-[11px]">データ管理</span></button>
        </div>

        <button id="floating-plus-btn" onclick="toggleModal(true)" class="absolute bottom-20 right-6 bg-blue-600 text-white w-14 h-14 rounded-full shadow-xl flex items-center justify-center text-3xl z-40">＋</button>

        <div id="input-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
            <div class="bg-white rounded-2xl w-full max-w-sm p-5 shadow-2xl">
                <h3 class="text-lg font-bold text-gray-800 mb-4">明細の追加</h3>
                <div class="flex gap-2 mb-4 bg-gray-100 p-1 rounded-lg">
                    <label class="flex-1 text-center py-1.5 rounded-md cursor-pointer font-bold text-xs bg-white text-red-600 shadow-xs" id="label-expense"><input type="radio" name="type" value="expense" checked onchange="switchType('expense')" class="hidden"> 支出</label>
                    <label class="flex-1 text-center py-1.5 rounded-md cursor-pointer font-bold text-xs" id="label-transfer"><input type="radio" name="type" value="transfer" onchange="switchType('transfer')" class="hidden"> 振替</label>
                    <label class="flex-1 text-center py-1.5 rounded-md cursor-pointer font-bold text-xs" id="label-income"><input type="radio" name="type" value="income" onchange="switchType('income')" class="hidden"> 収入</label>
                </div>
                <input type="date" id="input-date" class="w-full border rounded-lg p-2 mb-3 text-sm bg-gray-50">
                <select id="input-category" class="w-full border rounded-lg p-2 mb-3 text-sm bg-gray-50"></select>
                <select id="input-payment" class="w-full border rounded-lg p-2 mb-3 text-sm bg-gray-50"><option value="cash">通常</option><option value="paypay">PayPay</option><option value="suica">モバイルSuica</option></select>
                <input type="text" id="input-amount" placeholder="金額 (円)" oninput="formatAmountInput(this)" class="w-full border rounded-lg p-2 mb-3 text-sm bg-gray-50">
                <input type="text" id="input-summary" placeholder="概要" class="w-full border rounded-lg p-2 mb-5 text-sm bg-gray-50">
                <div class="flex justify-end gap-2"><button onclick="toggleModal(false)" class="px-4 py-2 text-sm text-gray-500">キャンセル</button><button onclick="saveTransaction()" class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg">保存</button></div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'my_kakeibo_core_data';
        let transactions = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        document.getElementById('input-date').value = new Date().toISOString().substring(0, 10);
        function formatAmountInput(el) { let v = el.value.replace(/[^0-9]/g, ''); el.value = v ? parseInt(v, 10).toLocaleString() : ''; }
        function switchType(type) {
            const cat = {'expense':["住宅費","食費","交際費","交通費","日用品費","その他支出"], 'transfer':["PayPayへチャージ","モバイルSuicaへチャージ"], 'income':["基本給","役職手当","その他"]}[type];
            document.getElementById('input-category').innerHTML = cat.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('payment-method-container')?.classList.toggle('hidden', type !== 'expense');
            document.querySelectorAll('label').forEach(l => l.classList.remove('bg-white', 'text-red-600', 'text-purple-600', 'text-green-600', 'shadow-xs'));
            document.getElementById('label-' + type).classList.add('bg-white', type==='expense'?'text-red-600':(type==='transfer'?'text-purple-600':'text-green-600'), 'shadow-xs');
        }
        function switchPage(page) {
            ['page-kakeibo', 'page-wallets', 'page-data-admin'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById('page-' + page).classList.remove('hidden');
            document.getElementById('floating-plus-btn').classList.toggle('hidden', page !== 'kakeibo');
        }
        function getBudgetMonth(dateStr) {
            const d = new Date(dateStr), day = d.getDate();
            let y = d.getFullYear(), m = d.getMonth() + 1;
            if (day >= 25 || (dateStr >= "2026-06-20" && dateStr <= "2026-06-24")) { m += 1; if (m > 12) { m = 1; y += 1; } }
            return `${y}-${String(m).padStart(2, '0')}`;
        }
        function saveTransaction() {
            const type = document.querySelector('input[name="type"]:checked').value, amt = parseInt(document.getElementById('input-amount').value.replace(/,/g, ''), 10) || 0;
            if (amt <= 0) return alert('金額を入力');
            transactions.push({ id: Date.now(), date: document.getElementById('input-date').value, category: document.getElementById('input-category').value, summary: document.getElementById('input-summary').value || '', type: type, income: type === 'income' ? amt : 0, expense: type === 'expense' ? amt : 0, amount: amt, payment: type === 'expense' ? document.getElementById('input-payment').value : 'cash' });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
            toggleModal(false);
            updateUI();
        }
        function updateUI() {
            let nB = 0, pB = 2340, sB = 2542;
            transactions.sort((a,b)=>a.date.localeCompare(b.date)).forEach(tx => {
                if(tx.type === 'income') nB += tx.income;
                else if(tx.type === 'expense') { if(tx.payment==='paypay') pB-=tx.expense; else if(tx.payment==='suica') sB-=tx.expense; else nB-=tx.expense; }
                else if(tx.type === 'transfer') { if(tx.category==='PayPayへチャージ') { nB-=tx.amount; pB+=tx.amount; } else if(tx.category==='モバイルSuicaへチャージ') { nB-=tx.amount; sB+=tx.amount; } }
            });
            document.getElementById('normal-balance').innerText = '¥' + nB.toLocaleString();
            document.getElementById('paypay-balance').innerText = '¥' + pB.toLocaleString();
            document.getElementById('suica-balance').innerText = '¥' + sB.toLocaleString();
            const month = document.getElementById('month-filter').value, fT = transactions.filter(tx => month==='all' || getBudgetMonth(tx.date)===month);
            let iT = fT.reduce((s,t)=>s+t.income,0), eT = fT.reduce((s,t)=>s+t.expense,0), eM = {};
            fT.forEach(tx => { if(tx.expense>0) eM[tx.category] = (eM[tx.category]||0) + tx.expense; });
            document.getElementById('total-income').innerText = '¥' + iT.toLocaleString();
            document.getElementById('total-expense').innerText = '¥' + eT.toLocaleString();
            document.getElementById('total-balance').innerText = '¥' + (iT - eT).toLocaleString();
            document.getElementById('history-list').innerHTML = fT.sort((a,b)=>b.date.localeCompare(a.date)).map(tx => `<div onclick="deleteTransaction(${tx.id})" class="bg-white border p-3 rounded-xl flex justify-between"><div class="text-xs text-gray-400">${tx.date}<br><span class="text-base text-gray-800">${tx.summary}</span></div><div class="text-base font-bold ${tx.type==='income'?'text-green-600':(tx.type==='expense'?'text-red-600':'text-purple-600')}">${tx.type==='income'?'+':''}${tx.type==='expense'?'-':''}${tx.amount.toLocaleString()}</div></div>`).join('');
            drawExpenseChart(eM);
        }
        function drawExpenseChart(eM) {
            const ctx = document.getElementById('expenseChart').getContext('2d'), keys = Object.keys(eM), data = Object.values(eM);
            if(expenseChart) expenseChart.destroy();
            expenseChart = new Chart(ctx, { type: 'doughnut', data: { labels: keys.map((k,i) => `${k} (${Math.round((data[i]/data.reduce((s,v)=>s+v,0))*100)}%)`), datasets: [{ data, backgroundColor: ['#ef4444', '#f97316', '#f59e0b', '#eab308', '#84cc16', '#10b981', '#06b6d4', '#3b82f6', '#6366f1', '#8b5cf6', '#d946ef', '#14b8a6', '#64748b', '#a855f7', '#0ea5e9', '#ec4899'] }] } });
        }
        function toggleModal(show) { document.getElementById('input-modal').classList.toggle('hidden', !show); }
        function exportData() { const d = JSON.stringify(transactions); const a = document.createElement('a'); a.href = 'data:application/json,' + encodeURIComponent(d); a.download = 'kakeibo.json'; a.click(); }
        function importData(e) { const r = new FileReader(); r.onload = (ev) => { transactions = JSON.parse(ev.target.result); localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions)); updateUI(); }; r.readAsText(e.target.files[0]); }
    </script>
</body>
</html>
